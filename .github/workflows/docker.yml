name: Docker

on:
  workflow_dispatch:
  push:
    branches: [feat/docker-arm64-support]

jobs:
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.cargo-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from Cargo.toml
        id: cargo-version
        run: |
          VERSION=v$(grep -m1 "^version" Cargo.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # - name: Check there is no existing image with the same version
      #   run: |
      #     if docker manifest inspect ghcr.io/gyulyvgc/sniffnet:${{ env.VERSION }}; then
      #       echo "Image with version ${{ env.VERSION }} already exists"
      #       exit 1
      #     fi

  build:
    name: Build ${{ matrix.platform }}
    needs: check-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v4
      #   with:
      #     registry: ghcr.io
      #     username: GyulyVGC
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: false

